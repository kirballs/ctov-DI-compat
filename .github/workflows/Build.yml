name: Build Mod

on:
  push:
    branches: ["di-petshop-compat-1.20.1", "di-petshop-compat-3.4.14"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17
        cache: 'gradle'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --stacktrace
      env:
        GRADLE_OPTS: "-Xmx4G -Dorg.gradle.daemon=false"

    - name: Upload Forge jar
      uses: actions/upload-artifact@v4
      with:
        name: ctov-di-compat-forge
        path: forge/build/libs/*forge*.jar
        if-no-files-found: warn

    - name: Upload NeoForge jar
      uses: actions/upload-artifact@v4
      with:
        name: ctov-di-compat-neoforge
        path: neoforge/build/libs/*neoforge*.jar
        if-no-files-found: warn

    - name: Upload Fabric jar
      uses: actions/upload-artifact@v4
      with:
        name: ctov-di-compat-fabric
        path: fabric/build/libs/*fabric*.jar
        if-no-files-found: warn

    - name: Upload all jars
      uses: actions/upload-artifact@v4
      with:
        name: ctov-di-compat-all-jars
        path: |
          */build/libs/*.jar
        if-no-files-found: warn
